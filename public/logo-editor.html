<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #08060d; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 2rem; font-family: system-ui; color: #e8e6ed; }
  h2 { margin-bottom: 1rem; font-size: 1rem; font-weight: 400; color: #908899; }
  .canvas { position: relative; }
  svg { border: 1px solid #241e32; border-radius: 8px; }
  .controls { margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem; max-width: 600px; width: 100%; }
  label { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; color: #908899; }
  textarea { width: 100%; height: 120px; background: #120e1a; color: #e8e6ed; border: 1px solid #241e32; border-radius: 6px; padding: 0.75rem; font-family: monospace; font-size: 0.8rem; resize: vertical; }
  button { background: #f0506a; color: #1a0e00; border: none; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .presets button { background: #241e32; color: #e8e6ed; font-size: 0.75rem; }
  .presets button:hover { background: #342e42; }
  #output { font-family: monospace; font-size: 0.75rem; color: #908899; margin-top: 1rem; }
</style>
</head>
<body>
  <h2>Covalence "Co" Logo Editor — drag control points or edit the path directly</h2>
  <div class="canvas">
    <svg id="svg" width="400" height="400" viewBox="0 0 120 120">
      <path id="logo" d="" stroke="#f0506a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <g id="handles"></g>
    </svg>
  </div>
  <div class="controls">
    <div class="presets">
      <button onclick="loadPreset('attempt1')">Current attempt</button>
      <button onclick="loadPreset('sidewaysS')">Sideways S</button>
      <button onclick="loadPreset('overAndUnder')">Over &amp; under</button>
    </div>
    <textarea id="pathInput"></textarea>
    <button onclick="updateFromText()">Update Path</button>
    <div id="output"></div>
  </div>

<script>
const presets = {
  attempt1: [
    {type:'M', x:68, y:20},
    {type:'C', x1:40, y1:12, x2:10, y2:30, x:10, y:60},
    {type:'C', x1:10, y1:90, x2:38, y2:104, x:60, y:90},
    {type:'C', x1:70, y1:84, x2:78, y2:74, x:82, y:62},
    {type:'C', x1:86, y1:50, x2:82, y2:42, x:74, y:42},
    {type:'C', x1:66, y1:42, x2:60, y2:50, x:60, y:58},
    {type:'C', x1:60, y1:66, x2:64, y2:72, x:72, y:70},
  ],
  sidewaysS: [
    {type:'M', x:72, y:18},
    {type:'C', x1:42, y1:8, x2:8, y2:24, x:8, y:52},
    {type:'C', x1:8, y1:72, x2:28, y2:82, x:48, y:76},
    {type:'C', x1:60, y1:72, x2:68, y2:64, x:72, y:54},
    {type:'C', x1:78, y1:40, x2:96, y2:48, x:96, y:66},
    {type:'C', x1:96, y1:84, x2:80, y2:100, x:64, y:100},
    {type:'C', x1:50, y1:100, x2:40, y2:92, x:40, y:82},
  ],
  overAndUnder: [
    {type:'M', x:74, y:18},
    {type:'C', x1:44, y1:6, x2:8, y2:22, x:8, y:54},
    {type:'C', x1:8, y1:78, x2:30, y2:88, x:50, y:78},
    {type:'C', x1:62, y1:72, x2:72, y2:60, x:80, y:48},
    {type:'C', x1:90, y1:34, x2:104, y2:44, x:104, y:62},
    {type:'C', x1:104, y1:80, x2:92, y2:96, x:76, y:96},
    {type:'C', x1:60, y1:96, x2:52, y2:84, x:56, y:72},
  ],
};

let points = [];
let dragging = null;
let dragKey = null;

function loadPreset(name) {
  points = JSON.parse(JSON.stringify(presets[name]));
  render();
}

function toPathString(pts) {
  return pts.map(p => {
    if (p.type === 'M') return `M ${p.x} ${p.y}`;
    if (p.type === 'C') return `C ${p.x1} ${p.y1}, ${p.x2} ${p.y2}, ${p.x} ${p.y}`;
  }).join(' ');
}

function render() {
  const path = document.getElementById('logo');
  const handles = document.getElementById('handles');
  const input = document.getElementById('pathInput');
  const output = document.getElementById('output');

  const d = toPathString(points);
  path.setAttribute('d', d);
  input.value = d;
  output.textContent = `Astro-ready: d="${d}"`;

  handles.innerHTML = '';
  points.forEach((p, i) => {
    addHandle(p, 'x', 'y', i, '#f0506a', 6);
    if (p.type === 'C') {
      addHandle(p, 'x1', 'y1', i, '#a78bfa', 4);
      addHandle(p, 'x2', 'y2', i, '#a78bfa', 4);
      // Draw control lines
      const prev = points[i-1];
      const prevX = prev.x;
      const prevY = prev.y;
      addLine(prevX, prevY, p.x1, p.y1, '#a78bfa');
      addLine(p.x2, p.y2, p.x, p.y, '#a78bfa');
    }
  });
}

function addLine(x1, y1, x2, y2, color) {
  const handles = document.getElementById('handles');
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('stroke', color); line.setAttribute('stroke-width', '0.5');
  line.setAttribute('opacity', '0.4');
  handles.appendChild(line);
}

function addHandle(p, kx, ky, idx, color, r) {
  const handles = document.getElementById('handles');
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', p[kx]);
  circle.setAttribute('cy', p[ky]);
  circle.setAttribute('r', r);
  circle.setAttribute('fill', color);
  circle.setAttribute('opacity', '0.8');
  circle.style.cursor = 'grab';
  circle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    dragging = { idx, kx, ky };
  });
  handles.appendChild(circle);
}

const svg = document.getElementById('svg');
svg.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = svg.getBoundingClientRect();
  const scaleX = 120 / rect.width;
  const scaleY = 120 / rect.height;
  const x = Math.round((e.clientX - rect.left) * scaleX);
  const y = Math.round((e.clientY - rect.top) * scaleY);
  points[dragging.idx][dragging.kx] = x;
  points[dragging.idx][dragging.ky] = y;
  render();
});

document.addEventListener('mouseup', () => { dragging = null; });

function updateFromText() {
  const input = document.getElementById('pathInput').value;
  // Basic parser
  const tokens = input.match(/[MC][^MC]*/g);
  if (!tokens) return;
  points = tokens.map(t => {
    t = t.trim();
    const nums = t.slice(1).match(/-?\d+(\.\d+)?/g).map(Number);
    if (t[0] === 'M') return {type:'M', x:nums[0], y:nums[1]};
    if (t[0] === 'C') return {type:'C', x1:nums[0], y1:nums[1], x2:nums[2], y2:nums[3], x:nums[4], y:nums[5]};
  });
  render();
}

loadPreset('overAndUnder');
</script>
</body>
</html>
