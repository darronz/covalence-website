name: new-release
on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  update-release-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Write latest-release.json
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          mkdir -p src/data
          printf '%s\n' "$PAYLOAD" | jq '.' > src/data/latest-release.json

      - name: Merge into releases.json
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          if [ ! -f src/data/releases.json ]; then
            echo '[]' > src/data/releases.json
          fi
          jq --argjson new "$PAYLOAD" '
            [ $new ] + map(select(.version != $new.version))
          ' src/data/releases.json > src/data/releases.json.tmp
          mv src/data/releases.json.tmp src/data/releases.json

      # Open a PR instead of pushing to main. Branch protection on main
      # requires PRs + passing 'build' check. PAT is needed because PRs
      # opened with the default GITHUB_TOKEN don't trigger other workflows
      # (GitHub's recursion prevention), so the 'build' status check would
      # never run. RELEASE_PR_TOKEN is a fine-grained PAT scoped to this
      # repo with Contents: RW, Pull requests: RW, Metadata: R.
      - name: Open PR with release data
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN }}
          commit-message: "chore(release): ${{ github.event.client_payload.tag }}"
          title: "chore(release): ${{ github.event.client_payload.tag }}"
          body: |
            Auto-opened by `new-release` workflow from `darronz/covalence` dispatch.

            - **tag**: ${{ github.event.client_payload.tag }}
            - **version**: ${{ github.event.client_payload.version }}
            - **released_at**: ${{ github.event.client_payload.released_at }}
            - **download**: ${{ github.event.client_payload.download_url }}
            - **size**: ${{ github.event.client_payload.download_size_bytes }} bytes
            - **sha256**: `${{ github.event.client_payload.sha256 }}`
          branch: "release/${{ github.event.client_payload.tag }}"
          delete-branch: true
          add-paths: |
            src/data/latest-release.json
            src/data/releases.json

      # Turn on auto-merge on the PR so it merges once 'build' passes.
      # Requires Settings → Pull Requests → Allow auto-merge.
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
